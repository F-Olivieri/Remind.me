name: RemindMe
options:
  bundleIdPrefix: com.folivieri
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  RemindMe:
    type: application
    platform: macOS
    sources:
      - path: Sources/RemindMe
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Remind.me
        CFBundleDisplayName: Remind.me
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Ferdinando Olivieri"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folivieri.RemindMe
        PRODUCT_NAME: "Remind.me"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
